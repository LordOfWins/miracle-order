<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제품 이미지 크롭 도구</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 360px;
      background: #16213e;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #333;
    }

    .sidebar-header h2 {
      font-size: 15px;
      margin-bottom: 10px;
      color: #4fc3f7;
    }

    .catalog-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .catalog-nav button {
      background: #0f3460;
      color: #eee;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .catalog-nav button:hover {
      background: #1a5276;
    }

    .catalog-info {
      font-size: 11px;
      color: #aaa;
      flex: 1;
      text-align: center;
      line-height: 1.4;
    }

    .catalog-cats {
      font-size: 11px;
      color: #4fc3f7;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4fc3f7;
      transition: width 0.3s;
    }

    .stats {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
    }

    .stats b {
      color: #4fc3f7;
    }

    .filter-bar {
      padding: 8px;
      border-bottom: 1px solid #333;
    }

    .filter-bar input,
    .filter-bar select {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #333;
      color: #eee;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
    }

    .filter-bar select {
      margin-top: 4px;
    }

    .filter-toggle {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .filter-toggle button {
      flex: 1;
      padding: 4px;
      font-size: 11px;
      border: 1px solid #333;
      background: #0d1b2a;
      color: #aaa;
      border-radius: 4px;
      cursor: pointer;
    }

    .filter-toggle button.active {
      background: #0f3460;
      color: #4fc3f7;
      border-color: #4fc3f7;
    }

    .product-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .product-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin-bottom: 3px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .product-item:hover {
      background: #1a3a5c;
    }

    .product-item.selected {
      background: #0f3460;
      border: 1px solid #4fc3f7;
    }

    .product-item.mapped {
      opacity: 0.55;
    }

    .product-item .check {
      width: 18px;
      text-align: center;
      font-size: 13px;
    }

    .product-item .cat {
      font-size: 10px;
      color: #666;
      white-space: nowrap;
      min-width: 60px;
    }

    .product-item .name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-item .thumb {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      object-fit: cover;
      background: #222;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: auto;
      background: #111;
      cursor: crosshair;
    }

    .canvas-wrapper canvas {
      display: block;
    }

    .crop-overlay {
      position: absolute;
      border: 2px dashed #4fc3f7;
      background: rgba(79, 195, 247, 0.1);
      pointer-events: none;
      display: none;
    }

    .crop-size {
      position: absolute;
      bottom: -22px;
      right: 0;
      font-size: 11px;
      color: #4fc3f7;
      background: rgba(0, 0, 0, 0.7);
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .toolbar {
      padding: 12px 16px;
      background: #16213e;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar .selected-name {
      flex: 1;
      font-size: 14px;
      color: #4fc3f7;
      min-width: 200px;
    }

    .toolbar button {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-crop {
      background: #4fc3f7;
      color: #000;
    }

    .btn-crop:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }

    .btn-undo {
      background: #e74c3c;
      color: #fff;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .zoom-controls button {
      padding: 4px 10px;
      background: #333;
      color: #eee;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .zoom-controls span {
      font-size: 12px;
      color: #aaa;
      min-width: 45px;
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: #4caf50;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      background: #e74c3c;
    }

    .preview-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a2e;
      border: 2px solid #4fc3f7;
      border-radius: 12px;
      padding: 20px;
      z-index: 100;
      display: none;
      text-align: center;
    }

    .preview-popup img {
      max-width: 300px;
      max-height: 300px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .preview-popup .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 99;
      display: none;
    }

    .shortcut-hint {
      font-size: 10px;
      color: #555;
      padding: 8px;
      text-align: center;
      border-top: 1px solid #222;
    }
  </style>
</head>

<body>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>미라클 제품 이미지 크롭</h2>
        <div class="catalog-nav">
          <button onclick="prevCatalog()">◀ 이전</button>
          <div class="catalog-info" id="catalogInfo">-</div>
          <button onclick="nextCatalog()">다음 ▶</button>
        </div>
        <div class="catalog-cats" id="catalogCats"></div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="stats" id="stats">로딩 중...</div>
      </div>
      <div class="filter-bar">
        <select id="categoryFilter" onchange="filterProducts()">
          <option value="">전체 카테고리</option>
        </select>
        <input type="text" id="searchInput" placeholder="제품명 검색..." oninput="filterProducts()">
        <div class="filter-toggle">
          <button id="filterAll" class="active" onclick="setFilter('all')">전체</button>
          <button id="filterTodo" onclick="setFilter('todo')">미완료</button>
          <button id="filterDone" onclick="setFilter('done')">완료</button>
          <button id="filterPage" onclick="setFilter('page')">현재 페이지</button>
        </div>
      </div>
      <div class="product-list" id="productList"></div>
      <div class="shortcut-hint">← → 페이지 이동 | Enter 크롭 저장 | Esc 선택 취소 | +/- 줌</div>
    </div>

    <div class="main">
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="canvas"></canvas>
        <div class="crop-overlay" id="cropOverlay">
          <div class="crop-size" id="cropSize"></div>
        </div>
      </div>
      <div class="toolbar">
        <div class="zoom-controls">
          <button onclick="changeZoom(-0.1)">−</button>
          <span id="zoomLevel">100%</span>
          <button onclick="changeZoom(0.1)">+</button>
          <button onclick="resetZoom()">맞춤</button>
        </div>
        <span class="selected-name" id="selectedName">⬅ 좌측에서 제품을 선택하세요</span>
        <button class="btn-crop" id="btnCrop" disabled onclick="doCrop()">크롭 저장 (Enter)</button>
        <button class="btn-undo" id="btnUndo" style="display:none" onclick="undoLast()">삭제</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="backdrop" id="backdrop" onclick="closePreview()"></div>
  <div class="preview-popup" id="previewPopup">
    <p style="margin-bottom:10px;font-weight:600" id="previewTitle"></p>
    <img id="previewImg">
    <div class="actions">
      <button class="btn-crop" onclick="closePreview()">확인</button>
      <button class="btn-undo" onclick="undoFromPreview()">삭제 후 다시</button>
    </div>
  </div>

  <script>
    let catalogFiles = [];   // [{ filename, categories }]
    let catalogIndex = 0;
    let products = [];
    let selectedProduct = null;
    let zoom = 1;
    let img = null;
    let filterMode = 'all';

    let isDragging = false;
    let cropStart = { x: 0, y: 0 };
    let cropEnd = { x: 0, y: 0 };
    let hasCrop = false;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasWrapper');
    const overlay = document.getElementById('cropOverlay');

    async function init() {
      const [catRes, prodRes] = await Promise.all([
        fetch('/api/catalog').then(r => r.json()),
        fetch('/api/products').then(r => r.json())
      ]);
      catalogFiles = catRes;
      products = prodRes;

      const cats = [...new Set(products.map(p => p.category))];
      const sel = document.getElementById('categoryFilter');
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });

      updateStats();
      renderProducts();
      if (catalogFiles.length > 0) loadCatalogImage(0);
    }

    function updateStats() {
      const total = products.length;
      const mapped = products.filter(p => p.mapped).length;
      document.getElementById('stats').innerHTML =
        `완료 <b>${mapped}</b> / 전체 <b>${total}</b> (${Math.round(mapped / total * 100)}%)`;
      document.getElementById('progressFill').style.width = `${mapped / total * 100}%`;
    }

    function setFilter(mode) {
      filterMode = mode;
      document.querySelectorAll('.filter-toggle button').forEach(b => b.classList.remove('active'));
      document.getElementById({ all: 'filterAll', todo: 'filterTodo', done: 'filterDone', page: 'filterPage' }[mode]).classList.add('active');
      renderProducts();
    }

    // 현재 카탈로그 페이지의 카테고리 목록
    function currentPageCategories() {
      if (!catalogFiles[catalogIndex]) return [];
      return catalogFiles[catalogIndex].categories || [];
    }

    function renderProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const pageCats = currentPageCategories();
      const list = document.getElementById('productList');
      list.innerHTML = '';

      let filtered = products.filter(p => {
        if (cat && p.category !== cat) return false;
        if (search && !p.name.toLowerCase().includes(search) && !p.category.toLowerCase().includes(search)) return false;
        if (filterMode === 'todo' && p.mapped) return false;
        if (filterMode === 'done' && !p.mapped) return false;
        if (filterMode === 'page' && !pageCats.includes(p.category)) return false;
        return true;
      });

      // 미매핑 먼저
      filtered.sort((a, b) => {
        if (a.mapped !== b.mapped) return a.mapped ? 1 : -1;
        return 0;
      });

      filtered.forEach(p => {
        const div = document.createElement('div');
        div.className = `product-item ${p.mapped ? 'mapped' : ''} ${selectedProduct?.name === p.name ? 'selected' : ''}`;

        let thumbHtml = '';
        if (p.mapped && p.mappedUrl) {
          thumbHtml = `<img class="thumb" src="${p.mappedUrl}?t=${Date.now()}" onclick="event.stopPropagation();showPreview('${escAttr(p.name)}','${p.mappedUrl}')">`;
        }

        div.innerHTML = `
      <span class="check">${p.mapped ? '✅' : '⬜'}</span>
      <span class="cat">${p.category}</span>
      <span class="name" title="${escAttr(p.name)}">${p.name}</span>
      ${thumbHtml}
    `;
        div.onclick = () => selectProduct(p);
        list.appendChild(div);
      });
    }

    function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    function filterProducts() { renderProducts(); }

    function selectProduct(p) {
      selectedProduct = p;
      document.getElementById('selectedName').textContent = `[${p.category}] ${p.name}`;
      document.getElementById('btnCrop').disabled = !hasCrop;
      document.getElementById('btnUndo').style.display = p.mapped ? 'inline-block' : 'none';
      renderProducts();

      // 해당 카테고리의 카탈로그 페이지로 자동 이동
      const targetIdx = catalogFiles.findIndex(cf => cf.categories.includes(p.category));
      if (targetIdx !== -1 && targetIdx !== catalogIndex) {
        loadCatalogImage(targetIdx);
      }
    }

    function loadCatalogImage(index) {
      catalogIndex = index;
      const cf = catalogFiles[index];
      document.getElementById('catalogInfo').innerHTML =
        `${cf.filename}<br>${index + 1} / ${catalogFiles.length}`;
      document.getElementById('catalogCats').textContent =
        cf.categories.length ? `📂 ${cf.categories.join(' / ')}` : '';

      // 현재 페이지 필터 모드면 제품 목록 갱신
      if (filterMode === 'page') renderProducts();

      img = new Image();
      img.onload = () => {
        resetZoom();
        clearCrop();
        drawCanvas();
      };
      img.src = `/catalog/${encodeURIComponent(cf.filename)}`;
    }

    function prevCatalog() { if (catalogIndex > 0) loadCatalogImage(catalogIndex - 1); }
    function nextCatalog() { if (catalogIndex < catalogFiles.length - 1) loadCatalogImage(catalogIndex + 1); }

    function resetZoom() {
      if (!img || !img.width) return;
      const r = wrapper.getBoundingClientRect();
      zoom = Math.min(r.width / img.width, r.height / img.height, 1);
      document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
      drawCanvas();
    }

    function changeZoom(d) {
      zoom = Math.max(0.1, Math.min(3, zoom + d));
      document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
      drawCanvas();
    }

    function drawCanvas() {
      if (!img || !img.width) return;
      canvas.width = img.width * zoom;
      canvas.height = img.height * zoom;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function clearCrop() {
      hasCrop = false;
      overlay.style.display = 'none';
      document.getElementById('btnCrop').disabled = true;
    }

    // 마우스 크롭
    wrapper.addEventListener('mousedown', (e) => {
      if (e.target !== canvas) return;
      isDragging = true;
      hasCrop = false;
      const rect = canvas.getBoundingClientRect();
      cropStart = {
        x: e.clientX - rect.left + wrapper.scrollLeft,
        y: e.clientY - rect.top + wrapper.scrollTop
      };
      overlay.style.display = 'none';
    });

    wrapper.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const rect = canvas.getBoundingClientRect();
      cropEnd = {
        x: e.clientX - rect.left + wrapper.scrollLeft,
        y: e.clientY - rect.top + wrapper.scrollTop
      };
      const x = Math.min(cropStart.x, cropEnd.x);
      const y = Math.min(cropStart.y, cropEnd.y);
      const w = Math.abs(cropEnd.x - cropStart.x);
      const h = Math.abs(cropEnd.y - cropStart.y);

      overlay.style.display = 'block';
      overlay.style.left = x + 'px';
      overlay.style.top = y + 'px';
      overlay.style.width = w + 'px';
      overlay.style.height = h + 'px';

      // 실제 픽셀 크기 표시
      document.getElementById('cropSize').textContent =
        `${Math.round(w / zoom)} × ${Math.round(h / zoom)} px`;
    });

    wrapper.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      const w = Math.abs(cropEnd.x - cropStart.x);
      const h = Math.abs(cropEnd.y - cropStart.y);
      if (w > 10 && h > 10) {
        hasCrop = true;
        if (selectedProduct) document.getElementById('btnCrop').disabled = false;
      }
    });

    async function doCrop() {
      if (!selectedProduct || !hasCrop) return;

      const x = Math.min(cropStart.x, cropEnd.x) / zoom;
      const y = Math.min(cropStart.y, cropEnd.y) / zoom;
      const w = Math.abs(cropEnd.x - cropStart.x) / zoom;
      const h = Math.abs(cropEnd.y - cropStart.y) / zoom;

      const btn = document.getElementById('btnCrop');
      btn.disabled = true;
      btn.textContent = '처리 중...';

      try {
        const res = await fetch('/api/crop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            productName: selectedProduct.name,
            catalogFile: catalogFiles[catalogIndex].filename,
            x, y, width: w, height: h
          })
        });
        const data = await res.json();

        if (data.success) {
          const p = products.find(p => p.name === selectedProduct.name);
          if (p) { p.mapped = true; p.mappedUrl = data.publicUrl; }

          showToast(`✅ ${selectedProduct.name} 저장 완료`);
          updateStats();

          // 현재 페이지 카테고리 기준으로 다음 미매핑 제품 자동 선택
          const pageCats = currentPageCategories();
          let next = products.find(p => !p.mapped && pageCats.includes(p.category));
          if (!next) next = products.find(p => !p.mapped);

          if (next) selectProduct(next);
          else {
            selectedProduct = null;
            document.getElementById('selectedName').textContent = '🎉 모든 제품 완료!';
          }

          renderProducts();
          clearCrop();
        } else {
          showToast(`❌ 실패: ${data.error}`, true);
        }
      } catch (err) {
        showToast(`❌ 오류: ${err.message}`, true);
      }

      btn.textContent = '크롭 저장 (Enter)';
    }

    async function undoLast() {
      if (!selectedProduct) return;
      const name = selectedProduct.name;
      await fetch('/api/unmap', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productName: name })
      });
      const p = products.find(p => p.name === name);
      if (p) { p.mapped = false; p.mappedUrl = null; }
      document.getElementById('btnUndo').style.display = 'none';
      updateStats();
      renderProducts();
      showToast(`🔄 ${name} 삭제됨`);
    }

    function showPreview(name, url) {
      document.getElementById('previewTitle').textContent = name;
      document.getElementById('previewImg').src = url + '?t=' + Date.now();
      document.getElementById('previewPopup').style.display = 'block';
      document.getElementById('backdrop').style.display = 'block';
      window._previewName = name;
    }
    function closePreview() {
      document.getElementById('previewPopup').style.display = 'none';
      document.getElementById('backdrop').style.display = 'none';
    }
    async function undoFromPreview() {
      closePreview();
      const p = products.find(p => p.name === window._previewName);
      if (p) { selectProduct(p); await undoLast(); }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2500);
    }

    document.addEventListener('keydown', (e) => {
      // 검색창에 포커스 있으면 단축키 무시
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;
      if (e.key === 'ArrowLeft') prevCatalog();
      if (e.key === 'ArrowRight') nextCatalog();
      if (e.key === 'Enter' && hasCrop && selectedProduct) doCrop();
      if (e.key === 'Escape') clearCrop();
      if (e.key === '+' || e.key === '=') changeZoom(0.1);
      if (e.key === '-') changeZoom(-0.1);
    });

    init();
  </script>
</body>

</html>
