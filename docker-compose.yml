# docker-compose.yml (프로덕션)
services:
  # ─── MariaDB ───
  mariadb:
    image: mariadb:10.11
    container_name: miracle-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: miracle_order
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - miracle_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    networks:
      - miracle-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js App ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    container_name: miracle-app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - miracle-net

  # ─── Nginx ───
  nginx:
    image: nginx:1.27-alpine
    container_name: miracle-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - app
    networks:
      - miracle-net

  # ─── Certbot ───
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    container_name: miracle-certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - miracle-net

volumes:
  miracle_data:
  uploads_data:
  certbot_etc:
  certbot_var:
  certbot_www:

networks:
  miracle-net:
    driver: bridge
